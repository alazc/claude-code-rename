name: Release

on:
  push:
    tags:
      - 'v*'

# contents: write     — required by softprops/action-gh-release to create the Release
# id-token: write     — required by `npm publish --provenance` for OIDC attestation
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: publish to npm + create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is needed so action-gh-release can generate notes from
          # commits since the previous tag.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run typecheck

      # Shortcut: run tests on ubuntu-latest only on release, not the full
      # 3-OS × 2-node matrix. ci.yml already validates the matrix on every PR
      # and push to main, so re-running it on every tag is overkill — the tag
      # we're shipping is always a commit that already passed full-matrix CI.
      - run: npm test

      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
